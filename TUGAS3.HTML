<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Formulir Pendaftaran Sederhana</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        /* Header Merah */
        header {
            background-color: #b22222;
            color: white;
            text-align: center;
            padding: 10px 0;
        }

        /* Navigasi */
        nav {
            background-color: #cd5c5c;
            text-align: center;
            padding: 5px 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-size: 14px;
        }

        /* Container Flexbox untuk membagi Form & Sidebar */
        .container {
            display: flex;
            max-width: 1100px;
            margin: 20px auto;
            gap: 20px;
            padding: 0 15px;
        }

        /* Area Form */
        .content-area {
            flex: 2;
            background: white;
            padding: 20px;
            border: 1px solid #ccc;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input[type="text"], 
        input[type="email"], 
        input[type="password"], 
        select, 
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        .submit-btn {
            width: 100%;
            padding: 10px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Sidebar Abu-abu */
        .sidebar {
            flex: 1;
            background-color: #bdc3c7;
            padding: 20px;
            border: 1px solid #999;
            min-height: 300px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Selamat Datang di Website Sederhana</h1>
    </header>

    <nav>
        <a href="#">Beranda</a>
        <a href="#">Tentang</a>
        <a href="#">Layanan</a>
        <a href="#">Kontak</a>
    </nav>

    <div class="container">
        <main class="content-area">
            <h3>Formulir Pendaftaran</h3>
            <p style="font-size: 0.9em;">Silakan isi formulir di bawah ini untuk mendaftar.</p>
            <hr>

            <form>
                <div class="form-group">
                    <label>Nama Lengkap:</label>
                    <input type="text" name="nama">
                </div>

                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" name="email">
                </div>

                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" name="password">
                </div>

                <div class="form-group">
                    <label>Jenis Kelamin:</label>
                    <input type="radio" name="jk" value="L"> Laki-laki<br>
                    <input type="radio" name="jk" value="P"> Perempuan
                </div>

                <div class="form-group">
                    <label>Hobi:</label>
                    <input type="checkbox" name="hobi"> Musik<br>
                    <input type="checkbox" name="hobi"> Olahraga<br>
                    <input type="checkbox" name="hobi"> Membaca
                </div>

                <div class="form-group">
                    <label>Pilih Kota:</label>
                    <select>
                        <option>Jakarta</option>
                        <option>Bekasi</option>
                        <option>Bandung</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Pesan Tambahan:</label>
                    <textarea rows="4" placeholder="Tulis pesan di sini..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Kirim</button>
            </form>
        </main>

        <aside class="sidebar">
            <h3>Sidebar</h3>
            <p>Bagian sidebar dapat berisi tautan, iklan, atau informasi tambahan.</p>
        </aside>
    </div>

</body>
</html>
