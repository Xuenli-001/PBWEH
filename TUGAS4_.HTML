<html>
<head>
    <title>Cek Nilai Mahasiswa</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 400px; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #hasil { margin-top: 20px; font-weight: bold; padding: 10px; border-radius: 4px; }
        .error { color: red; background-color: #ffe6e6; }
        .sukses { color: green; background-color: #e6ffed; }
    </style>
</head>
<body>

<div class="container">
    <h2>Program Cek Nilai</h2>
    
    <div class="input-group">
        <label for="nim">NIM:</label>
        <input type="text" id="nim" placeholder="Masukkan NIM">
    </div>

    <div class="input-group">
        <label for="nilai">Nilai Mata Kuliah:</label>
        <input type="number" id="nilai" placeholder="0 - 100">
    </div>

    <button id="btnCek">Cek Nilai</button>

    <div id="hasil"></div>
</div>

<script>
    // Bagian b: Menangani event klik tombol
    document.getElementById('btnCek').addEventListener('click', function() {
        const nim = document.getElementById('nim').value;
        const nilaiInput = document.getElementById('nilai').value;
        const hasilDiv = document.getElementById('hasil');
        
        // Konversi input ke angka
        const nilai = parseFloat(nilaiInput);

        // Reset tampilan hasil
        hasilDiv.className = '';
        
        // Validasi NIM kosong
        if (nim === "") {
            hasilDiv.innerHTML = "Harap masukkan NIM!";
            hasilDiv.classList.add('error');
            return;
        }

        // Cek rentang nilai 0 - 100
        if (isNaN(nilai) || nilai < 0 || nilai > 100) {
            hasilDiv.innerHTML = "Nilai tidak valid!";
            hasilDiv.classList.add('error');
        } else {
            // Bagian c: Kondisi if-else untuk menentukan huruf mutu
            let hurufMutu = "";

            if (nilai >= 80) {
                hurufMutu = "A";
            } else if (nilai >= 70) {
                hurufMutu = "B";
            } else if (nilai >= 60) {
                hurufMutu = "C";
            } else if (nilai >= 50) {
                hurufMutu = "D";
            } else {
                hurufMutu = "E";
            }

            // Tampilkan hasil sukses
            hasilDiv.innerHTML = `NIM: ${nim} <br> Huruf Mutu: ${hurufMutu}`;
            hasilDiv.classList.add('sukses');
        }
    });
</script>

</body>
</html>
